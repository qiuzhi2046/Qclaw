name: GitHub Actions CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Smoke verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 22.22.1
        uses: actions/setup-node@v5
        with:
          node-version: '22.22.1'

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Run app build smoke test
        run: npm run build:app

  test:
    name: Vitest (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 22.22.1
        uses: actions/setup-node@v5
        with:
          node-version: '22.22.1'

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install

      - name: Run full Vitest suite
        run: npm test

  model-regression:
    name: Model regression (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - verify
      - test

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Use Node.js 22.22.1
        uses: actions/setup-node@v5
        with:
          node-version: '22.22.1'

      - name: Show tool versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm install

      - name: Run model regression suite
        run: npm run test:model-regression -- --skip-typecheck
